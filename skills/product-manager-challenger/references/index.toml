priority = 30

[[references]]
file = "discovery-wenyan.md"

[references.metadata.trigger]
summary = "Use for ambiguous or greenfield asks, scope decomposition, or one-question-at-a-time discovery before hard challenge."
intent_tags = [
  "ambiguous",
  "greenfield",
  "discovery",
  "decompose",
  "scope",
  "brainstorm",
  "clarify",
  "intent",
]
when_to_use = [
  "Explore an unclear or oversized idea before locking scope.",
  "Decompose a large request into ordered sub-problems.",
]

[references.metadata.objective]
