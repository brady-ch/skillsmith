[[references]]
file = "approval-gate-wenyan.md"

[references.metadata.trigger]
summary = "Use for locking scope, explicit approval before coding, or spec-freeze discipline."
intent_tags = [
  "approval",
  "freeze",
  "spec",
  "signoff",
  "lock",
  "design-approval",
  "before-code",
  "acceptance",
  "criteria",
]
when_to_use = [
  "Gate implementation on explicit user approval.",
  "Freeze problem statement, success criteria, and out-of-scope boundaries.",
]

[references.metadata.objective]
summary = "Stop forward work until scope and success are explicitly approved; surface what must change to proceed."

[references.metadata.output]
summary = "Return a minimal lock statement (problem, success, out) or the missing approval pieces."

[references.metadata.navigation]
summary = "Prefer after discovery when the user is about to implement or expand scope without signoff."
priority = 12

