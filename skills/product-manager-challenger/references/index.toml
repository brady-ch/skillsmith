[references.metadata.output]
summary = "Return the tracking file updates, item status changes, and any missing execution detail."

[references.metadata.navigation]
summary = "Prefer this reference when setting up or updating `.product/tracking.md` and related structure."
priority = 20

[[references]]
file = "item-routing-wenyan.md"

[references.metadata.trigger]
summary = "Use for deciding which detail files belong under a tracked item folder."
intent_tags = ["routing", "decision-tree", "details", "acceptance", "blockers"]
when_to_use = ["Route item details into the correct files.", "Decide whether an item needs questions, plan, or blocker docs."]

[references.metadata.objective]
summary = "Keep per-item detail lightweight and route each kind of information into one clear file."

[references.metadata.output]
summary = "Return the chosen item files, why they are needed, and the resulting status implications."

[references.metadata.navigation]
