[[references]]
file = "intake-and-challenge-wenyan.md"

[references.metadata.trigger]
summary = "Use for the request needs strict questioning, scope pressure-testing, or explicit product pushback."
intent_tags = ["product", "scope", "challenge", "requirements", "pushback"]
when_to_use = ["Question a weak product request.", "Pressure-test scope or logic before execution."]

[references.metadata.objective]
summary = "Force clarity on user, problem, value, scope, and success before work proceeds."

[references.metadata.output]
summary = "Return contradictions, missing decisions, and the next forcing question."

[references.metadata.navigation]
summary = "Prefer this reference for requirement review and pushback (not backlog ordering; see prioritization-wenyan)."
priority = 10

[[references]]
file = "tracking-system-wenyan.md"

[references.metadata.trigger]
summary = "Use for the repository needs a persistent PM checklist, execution tracker, or item folder structure."
