# Token-first catalog: small set of high value-per-token locals. Route with recommend/trace,
# then SKILL.md → reference-router.md → one reference (decision-tree style).
[[locals]]
name = "using-skillsmith"
relative_path = "skills/using-skillsmith"

[locals.metadata.trigger]
summary = "Use for skillsmith checkout or default agent rules."
intent_tags = ["setup", "bootstrap", "install", "workflow", "agent", "rules", "validate"]
when_to_use = [
  "Set up a skillsmith checkout.",
  "Install the default agent rules into a project.",
  "Need the repo workflow for skillsmith work.",
]
skill_role = "process"
order_weight = -10

[locals.metadata.objective]
summary = "Provide the default workflow and install rules for agents working in skillsmith."

[locals.metadata.output]
summary = "Return the repo-root workflow, install guidance, and validation steps."

[locals.metadata.navigation]
summary = "Load the router first, then this checklist."
priority = 5

[locals.metadata]
tier = "lite"
token_hint = 900

[[locals]]
name = "product-manager-challenger"
relative_path = "skills/product-manager-challenger"

[locals.metadata.trigger]
summary = "Use when the user wants strict product management, hard questioning, scope pushback, or repo-native tracking for approved work."
intent_tags = ["product", "pm", "scope", "requirements", "tracking", "todo", "prioritization"]
when_to_use = ["Challenge a product request that may not make sense yet.", "Create and maintain a repository tracking checklist with item detail folders."]

